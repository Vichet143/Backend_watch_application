<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment QR Scan</title>
  <style>
    :root {
      --bg: #f4efe4;
      --panel: #fffaf0;
      --ink: #1f241f;
      --muted: #5a645d;
      --accent: #005f5a;
      --accent-2: #c08a24;
      --border: #d8ccb3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      background: radial-gradient(circle at 20% 20%, #fff7e8, var(--bg));
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(30, 30, 30, 0.1);
      overflow: hidden;
    }

    .head {
      padding: 18px 20px;
      background: linear-gradient(135deg, var(--accent), #0c7a73);
      color: #ffffff;
    }

    .head h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.3px;
    }

    .head p {
      margin: 8px 0 0;
      font-size: 0.9rem;
      opacity: 0.95;
    }

    .body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font-size: 0.95rem;
    }

    .btn {
      border: 0;
      background: linear-gradient(135deg, var(--accent-2), #d89e31);
      color: #202020;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .qr-wrap {
      background: #ffffff;
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 16px;
      display: grid;
      place-items: center;
      min-height: 290px;
    }

    .qr-wrap img {
      width: min(320px, 100%);
      height: auto;
      border-radius: 8px;
      border: 8px solid #ffffff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      font-size: 0.85rem;
      word-break: break-all;
      color: #334;
    }
  </style>
</head>

<body>
  <main class="card">
    <section class="head">
      <h1>Generate Payment QR</h1>
      <p>Create KHQR and display image for customer scan payment.</p>
    </section>

    <section class="body">
      <div class="grid">
        <div>
          <label for="deliveryId">Delivery ID</label>
          <input id="deliveryId" value="DEL-1001" />
        </div>
        <div>
          <label for="userId">User ID</label>
          <input id="userId" value="USR-2001" />
        </div>
        <div>
          <label for="amount">Amount (USD)</label>
          <input id="amount" type="number" step="0.01" value="12.50" />
        </div>
        <div>
          <label for="bakongAccount">Bakong Receiver Account</label>
          <input id="bakongAccount" placeholder="merchant@aclb" />
        </div>
      </div>

      <button class="btn" id="generateBtn">Generate QR</button>
      <div class="status" id="status"></div>

      <div class="qr-wrap">
        <img id="qrImage" alt="Generated QR will appear here" style="display:none" />
        <div id="emptyText">QR image will appear here after generate.</div>
      </div>

      <div class="mono" id="paymentInfo"></div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const qrImage = document.getElementById("qrImage");
    const emptyText = document.getElementById("emptyText");
    const info = document.getElementById("paymentInfo");

    document.getElementById("generateBtn").addEventListener("click", async () => {
      statusEl.textContent = "Generating payment QR...";
      info.textContent = "";

      const payload = {
        delivery_id: document.getElementById("deliveryId").value.trim(),
        user_id: document.getElementById("userId").value.trim(),
        amount: Number(document.getElementById("amount").value),
        currency: "USD",
        description: "Payment from scan page",
        bakong_account_id: document.getElementById("bakongAccount").value.trim(),
        merchant_name: "Watch Store"
      };

      try {
        const res = await fetch("/payments/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const json = await res.json();
        if (!res.ok || !json.success) {
          throw new Error(json.message || "Failed to generate payment");
        }

        const data = json.data || {};
        if (!data.qrCode || !String(data.qrCode).startsWith("data:image")) {
          throw new Error("QR image data missing in response.");
        }

        qrImage.src = data.qrCode;
        qrImage.style.display = "block";
        emptyText.style.display = "none";

        statusEl.textContent = "QR ready. Open this page on another device to scan and pay.";
        info.textContent = `paymentId: ${data.paymentId || ""} | transactionId: ${data.transactionId || ""}`;
      } catch (err) {
        statusEl.textContent = err.message;
        qrImage.style.display = "none";
        emptyText.style.display = "block";
      }
    });
  </script>
</body>

</html>
